name: XAU/USD 24/7 Trading Alerts

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "0 0 * * 1-5"
    - cron: "*/30 7-16 * * 1-5"
    - cron: "*/30 12-21 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "0 8 * * 1-5"
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance requests ephem pandas

      - name: Determine alert mode
        id: mode
        run: |
          HOUR=$(date -u +%H | sed 's/^0//')
          MIN=$(date -u +%M | sed 's/^0//')
          SESSION_HOURS="0 7 8 12 16 21"
          if [[ $MIN -eq 0 ]] && echo "$SESSION_HOURS" | grep -qw "$HOUR"; then
            echo "mode=session" >> $GITHUB_OUTPUT
          elif [[ $MIN -eq 0 ]]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=signal" >> $GITHUB_OUTPUT
          fi

      - name: Run XAU/USD bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
          ALERT_MODE: ${{ steps.mode.outputs.mode }}
        run: python xauusd_bot.py
