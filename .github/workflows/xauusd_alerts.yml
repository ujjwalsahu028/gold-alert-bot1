name: XAU/USD 24/7 Trading Alerts

on:
  schedule:
    # ── FULL ALERT (IST times shown) ──────────────────────────────────────────
    - cron: "30 1 * * 1-5"   # 07:00 AM IST — Morning full briefing
    - cron: "30 7 * * 1-5"   # 01:00 PM IST — London open full
    - cron: "30 11 * * 1-5"  # 05:00 PM IST — NY open full
    - cron: "0  16 * * 1-5"  # 09:30 PM IST — NY session midpoint

    # ── SIGNAL ALERT every 30 min during active hours ─────────────────────────
    - cron: "0,30 2-15 * * 1-5"   # 07:30 AM – 09:00 PM IST signals

    # ── SESSION OPEN / CLOSE ──────────────────────────────────────────────────
    - cron: "30 1  * * 1-5"  # Asia open  (07:00 IST)
    - cron: "30 13 * * 1-5"  # Asia close (07:00 IST)
    - cron: "30 7  * * 1-5"  # London open
    - cron: "30 21 * * 1-5"  # London close
    - cron: "30 11 * * 1-5"  # NY open
    - cron: "0  2  * * 1-5"  # NY close (next day UTC)

    # ── NEWS ALERT — daily morning + weekly Monday ────────────────────────────
    - cron: "0 2 * * 1-5"    # 07:30 AM IST — daily news briefing
    - cron: "0 2 * * 1"      # Monday morning — weekly calendar

  workflow_dispatch:          # Manual run anytime

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install yfinance requests ephem pandas

      - name: Determine alert mode
        id: mode
        run: |
          HOUR=$(date -u +%H | sed 's/^0*//' || echo 0)
          MIN=$(date -u +%M | sed 's/^0*//' || echo 0)
          DOW=$(date -u +%u)

          # Session open/close hours (UTC)
          SESSION_HOURS="0 7 8 12 16 21"

          if [[ "$DOW" == "1" && "$HOUR" == "2" && "$MIN" == "0" ]]; then
            echo "mode=news" >> $GITHUB_OUTPUT
          elif [[ "$MIN" == "0" ]] && echo "$SESSION_HOURS" | grep -qw "$HOUR"; then
            echo "mode=session" >> $GITHUB_OUTPUT
          elif [[ "$HOUR" == "1" || "$HOUR" == "7" || "$HOUR" == "11" || "$HOUR" == "16" ]]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=signal" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WA_PHONE:         ${{ secrets.WA_PHONE }}
          WA_APIKEY:        ${{ secrets.WA_APIKEY }}
          ALERT_MODE:       ${{ steps.mode.outputs.mode }}
        run: python xauusd_bot.py
